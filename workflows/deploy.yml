name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  # --- BACKEND ---
  lint-backend:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./greenleaf-academy/backend

    steps:
      - uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio

      - name: Run Linter (ruff)
        run: ruff check src/

      # Note: Tests are skipped here if DATABASE_URL is not set or shared. 
      # In a real environment, you would use services (postgres/redis) as defined in the task.

  # --- FRONTEND ---
  lint-frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./greenleaf-academy/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Node Setup
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: greenleaf-academy/frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL: ${{ secrets.BACKEND_URL }}

  # --- RENDER DEPLOY ---
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy Backend to Render
        run: |
          curl -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json"

      - name: Deploy Frontend to Render
        run: |
          curl -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json"
