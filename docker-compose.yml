version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-greenleaf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-greenleaf_dev}
      POSTGRES_DB: ${POSTGRES_DB:-greenleaf_db}
    ports:
      - "5435:5432"  # Standard port for pgAdmin access
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-greenleaf} -d ${POSTGRES_DB:-greenleaf_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      APP_ENV: development
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-greenleaf}:${POSTGRES_PASSWORD:-greenleaf_dev}@postgres:5432/${POSTGRES_DB:-greenleaf_db}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn src.app:app --host 0.0.0.0 --port 8000 --reload

  # ── ARQ Worker ───────────────────────────────────────────────────────────────
  arq-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      APP_ENV: development
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-greenleaf}:${POSTGRES_PASSWORD:-greenleaf_dev}@postgres:5432/${POSTGRES_DB:-greenleaf_db}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: arq src.worker.WorkerSettings

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data_local:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
