services:
  # --- BACKEND ---
  - type: web
    name: greenleaf-backend
    runtime: python
    branch: main
    rootDir: backend
    # seed_initial_data.py kasıtlı olarak buraya dahil edilmemiştir.
    # İlk veri yüklemesi deploy sonrası manuel olarak bir kez çalıştırılmalıdır:
    #   render run greenleaf-backend -- python seed_initial_data.py
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn src.app:app --host 0.0.0.0 --port 10000
    plan: starter
    disk:
      name: greenleaf-uploads
      mountPath: /var/data/uploads   # UPLOAD_DIR ile aynı path — alt klasör oluşturmaya gerek yok
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: greenleaf-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: greenleaf-redis
          type: redis
          property: connectionString
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM_ADDRESS
        value: noreply@greenleafakademi.com
      - key: MAIL_FROM_NAME
        value: Greenleaf Akademi
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: CORS_ALLOWED_ORIGIN_REGEX
        value: 'https?://([a-z0-9-]+\.)*greenleafakademi\.com'
      - key: FRONTEND_URL
        value: https://tr.greenleafakademi.com

  # --- FRONTEND ---
  - type: web
    name: greenleaf-frontend
    runtime: node
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        value: https://greenleaf-backend-wkfv.onrender.com

  # --- REDIS ---
  - type: redis
    name: greenleaf-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all

databases:
  - name: greenleaf-postgres
    databaseName: greenleaf_db
    user: greenleaf
    plan: free