services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - APP_ENV=development
      - PYTHONPATH=/app/src
      - DATABASE_URL=postgresql+asyncpg://greenleaf:greenleaf_dev@postgres:5432/greenleaf_db
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: uvicorn src.app:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: greenleaf
      POSTGRES_PASSWORD: greenleaf_dev
      POSTGRES_DB: greenleaf_db
    ports:
      - "5435:5432" # Host port 5435 maps to container port 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  arq-worker:
    build: .
    volumes:
      - .:/app
    environment:
      - APP_ENV=development
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://greenleaf:greenleaf_dev@postgres:5432/greenleaf_db
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - redis
    command: arq src.worker.WorkerSettings

volumes:
  postgres_data:
