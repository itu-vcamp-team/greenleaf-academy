version: "3.9"

# ─── Production Docker Compose ────────────────────────────────────────────────
# Kullanım: docker compose -f docker-compose.prod.yml up -d --build
#
# Gerekli .env.prod dosyası (asla git'e commit etme!):
#   /opt/greenleaf/.env.prod
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    environment:
      APP_ENV: production
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - uploads_data:/var/data/uploads
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Migration'ları çalıştır, ardından uygulamayı başlat
    command: >
      sh -c "alembic upgrade head &&
             uvicorn src.app:app --host 0.0.0.0 --port 8000 --workers 2"

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Next.js server-side proxy için — internal docker DNS kullanır
        NEXT_PUBLIC_BACKEND_URL: http://backend:8000
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BACKEND_URL: http://backend:8000
    networks:
      - internal
    depends_on:
      - backend

  # ── Nginx (Reverse Proxy + SSL) ──────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro          # Cloudflare Origin Cert
      - uploads_data:/var/data/uploads:ro              # Static dosya servisi
    networks:
      - internal
    depends_on:
      - frontend
      - backend

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  uploads_data:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
